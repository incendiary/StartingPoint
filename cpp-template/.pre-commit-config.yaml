repos:
  # Layer 1: pattern matching — fast, catches obvious secrets locally
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks

  # Layer 2: verified credential detection — makes live API calls to confirm secrets are active
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.2
    hooks:
      - id: trufflehog
        args: ["git", "file://.", "--results=verified,unknown", "--since-commit", "HEAD", "--no-update"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c, c++]
